<!doctype html>
<html lang="en-NG">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>New Era Transport Services (NETS) — Premium Bus Rental Nigeria</title>
    <meta name="description" content="New Era Transport Services provides premium bus rental and transportation solutions for organisations, institutions and individuals across Nigeria." />
    <meta name="keywords" content="bus rental Nigeria, corporate bus hire Lagos, staff transportation, coach hire, fleet management Nigeria, NETS" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="New Era Transport Services Ltd" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://netsnigeria.com/" />
    <meta property="og:title" content="New Era Transport Services — Premium Bus Rental Nigeria" />
    <meta property="og:description" content="Premium transportation solutions for organisations, institutions and individuals across Nigeria. Professional drivers, modern fleet, 24/7 support." />
    <meta property="og:image" content="https://netsnigeria.com/og-image.jpg" />
    <meta property="og:locale" content="en_NG" />
    <meta property="og:site_name" content="New Era Transport Services" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="New Era Transport Services — Premium Bus Rental Nigeria" />
    <meta name="twitter:description" content="Premium transportation solutions for organisations, institutions and individuals across Nigeria." />
    <meta name="twitter:image" content="https://netsnigeria.com/og-image.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://netsnigeria.com/" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preconnect for Unsplash images -->
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "New Era Transport Services",
      "alternateName": "NETS",
      "url": "https://netsnigeria.com",
      "logo": "https://netsnigeria.com/logo.svg",
      "description": "Premium bus rental and corporate transportation services in Nigeria.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressCountry": "NG"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+234-800-000-0000",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.linkedin.com/company/nets-nigeria",
        "https://twitter.com/netsnigeria"
      ]
    }
    </script>

    <!-- Structured Data — Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "New Era Transport Services",
      "image": "https://netsnigeria.com/og-image.jpg",
      "url": "https://netsnigeria.com",
      "telephone": "+234-800-000-0000",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressCountry": "NG"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
